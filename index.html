<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flush</title>
  <link rel="stylesheet" href="./project/tokens.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #root {
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const DEVICE_W = 402, DEVICE_H = 874;

    function scaleToFit() {
      const scale = Math.min(
        window.innerWidth  / DEVICE_W,
        window.innerHeight / DEVICE_H
      );
      document.getElementById('root').style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', scaleToFit);
    // run once DOM is ready
    document.addEventListener('DOMContentLoaded', scaleToFit);
  </script>

  <script>
    (async function () {
      try {
        const babelOpts = {
          presets: [['react', { runtime: 'classic' }]],
        };

        const sources = [
          './project/ios-frame.jsx',
          './project/flush-scenes.jsx',
        ];

        for (const src of sources) {
          const code = await fetch(src).then(r => r.text());
          const { code: js } = Babel.transform(code, babelOpts);
          (0, eval)(js);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.FlushWeatherTap));
        scaleToFit();
      } catch (err) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#ff5e48;padding:32px;font-size:13px;white-space:pre-wrap">' +
          err.stack + '</pre>';
      }
    })();
  </script>
</body>
</html>
