<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="stylesheet" href="tokens.css">
<style>
  body{margin:0;background:#EFEAE2;font-family:"Season Sans",system-ui,sans-serif}
  a{color:#4C1D44}a:hover{color:#2A0824}
  .dv-turn{padding:48px 52px 40px;scroll-margin-top:16px}
  .dv-thd{display:flex;align-items:baseline;gap:12px;margin:0 0 6px}
  .dv-tid{font:600 10px ui-monospace,Menlo,monospace;padding:3px 7px;background:#010204;color:#fff;border-radius:4px;text-decoration:none}
  .dv-tname{font:600 13px/1.3 "Season Sans",system-ui;color:#2A0824}
  .dv-intro{max-width:560px;margin:0 0 34px;font:400 14px/1.55 "Season Sans",system-ui;color:rgba(42,8,36,.62)}
  .dv-opts{display:flex;flex-wrap:wrap;gap:44px;align-items:flex-start}
  .dv-opt{flex:none;display:flex;flex-direction:column;gap:14px;scroll-margin-top:16px}
  .dv-olabel{display:flex;align-items:baseline;gap:10px}
  .dv-oid{font:600 10.5px ui-monospace,Menlo,monospace;padding:3px 7px;background:rgba(1,2,4,.08);color:#010204;border-radius:5px;text-decoration:none}
  .dv-oname{font:600 15px/1.2 "Season Serif",Georgia,serif;color:#2A0824}
  .dv-odesc{max-width:402px;font:400 13px/1.5 "Season Sans",system-ui;color:rgba(42,8,36,.6)}
  .dv-opt:target .dv-oid{background:#4C1D44;color:#fff}
  .dv-hint{margin-top:4px;font:500 11px/1.4 "Season Sans",system-ui;color:rgba(42,8,36,.42);letter-spacing:.2px}
  .dv-next{margin:34px 0 0;font:13px/1.6 "Season Sans",system-ui;color:rgba(42,8,36,.5)}
</style>
</helmet>
<section style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px">
  <x-import component-from-global-scope="FlushWeatherTap" from="./ios-frame.jsx ./flush-scenes.jsx" hint-size="402px,874px"></x-import>
</section>
</x-dc>
